<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Badge circulaire HBC Pays de Broons (vectorisation du logo officiel) -->
  <defs>
    <path id="arcTop" d="M 30 100 A 70 70 0 0 1 170 100" fill="none"/>
    <path id="arcBottom" d="M 38 100 A 62 62 0 0 0 162 100" fill="none"/>
  </defs>
  <circle cx="100" cy="100" r="98" fill="#ffffff"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="#17130F" stroke-width="3"/>
  <circle cx="100" cy="100" r="86" fill="none" stroke="#17130F" stroke-width="1.5"/>

  <text font-family="Archivo, Arial, sans-serif" font-weight="800" font-size="21" fill="#17130F" letter-spacing="2">
    <textPath href="#arcTop" startOffset="50%" text-anchor="middle">PAYS DE BROONS</textPath>
  </text>
  <text font-family="Archivo, Arial, sans-serif" font-weight="700" font-size="13" fill="#17130F" letter-spacing="3">
    <textPath href="#arcBottom" startOffset="50%" text-anchor="middle" side="right">HANDBALL CLUB</textPath>
  </text>

  <!-- écusson rouge à liseré blanc, bande blanche diagonale -->
  <g>
    <path d="M100 52 L138 62 V104 C138 128 122 142 100 152 C78 142 62 128 62 104 V62 Z"
          fill="#D81E34" stroke="#17130F" stroke-width="2.5"/>
    <path d="M78 56 L98 148 L112 142 L88 54 Z" fill="#ffffff" opacity=".92"/>
  </g>

  <!-- joueur de hand stylisé (silhouette noire) -->
  <g fill="#17130F">
    <circle cx="112" cy="76" r="7.5"/>
    <!-- bras levé + ballon -->
    <path d="M110 84 C104 88 98 92 92 92 L80 84 C78 82.5 79.5 79.5 82 80.5 L92 85 C99 84 104 81 108 78 Z"/>
    <circle cx="76" cy="79" r="6" fill="none" stroke="#17130F" stroke-width="2.5"/>
    <!-- tronc -->
    <path d="M110 84 C116 90 118 98 114 106 L104 118 C100 116 98 114 97 111 L105 100 C106 95 106 90 104 87 Z"/>
    <!-- jambe avant -->
    <path d="M104 118 L96 132 C94 135 90 133 91 130 L97 114 Z"/>
    <!-- jambe arrière -->
    <path d="M112 107 L124 118 C126 120 124 124 121 122 L108 113 Z"/>
  </g>
</svg>
